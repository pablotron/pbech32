name: CI

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_lint_test:
    name: "build, lint, test (${{ matrix.toolchain }})"
    runs-on: "rust"
    strategy:
      matrix:
        toolchain:
          - stable
          - beta
          - nightly
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      - run: rustup component add clippy
      - run: cargo build --verbose
      - run: cargo clippy
      - run: cargo test --verbose 

  doc:
    name: "doc"
    runs-on: "rust"
    steps:
      - uses: actions/checkout@v5
      - run: cargo doc

  # lint all markdown
  lint_markdown:
    name: "lint markdown"
    runs-on: "rust"
    steps:
      - uses: actions/checkout@v5
      - run: npm config set update-notifier false
      - run: npx -y markdownlint-cli '**/*.md'

  # check code coverage (disabled in forgejo for now)
  # - fails if coverage drops below 95%
  # - generates "pbech32-tarpaulin-report-YYYYMMDD.zip" artifact
  coverage:
    name: "coverage"
    runs-on: "rust"
    steps:
      - run: echo "DATESTAMP=$(date +%Y%m%d)" >> $FORGEJO_ENV
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # install cargo-binstall, then use it to install cargo-tarpaulin
      - run: cargo install cargo-binstall
      - run: cargo binstall --no-confirm cargo-tarpaulin

      # run tarpaulin and fail if code coverage is below 95%
      #
      # run with llvm engine (required for non-x86 and forgejo), use
      # single thread, and include ignored tests.
      #
      # the single thread is to work around threading issues for
      # tests::action::test_from_env() in `src/bin/bech32.rs`
      - run: cargo +nightly tarpaulin --engine llvm -j1 -i -o html --timeout 120 --fail-under 95
      - run: mv tarpaulin-report.html pbech32-coverage-${{ env.DATESTAMP }}.html
      - uses: actions/upload-artifact@v3
        with:
          name: pbech32-coverage-${{ env.DATESTAMP }}
          path: pbech32-coverage-${{ env.DATESTAMP }}.html

  # security audit
  # (note: mostly pointless since pbech32 has no dependencies)
  audit:
    name: "audit"
    runs-on: "rust"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/advisory-db
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo audit
